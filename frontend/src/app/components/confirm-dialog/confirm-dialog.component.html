<!-- src/app/components/confirm-dialog/confirm-dialog.component.html -->

<div class="confirm-dialog">

  <div class="dialog-icon" [ngClass]="data.type || 'danger'">
    <mat-icon>{{ getIcon() }}</mat-icon>
  </div>

  <h2 mat-dialog-title>{{ data.title || 'Confirmer' }}</h2>

  <mat-dialog-content>
    <p>{{ data.message }}</p>
  </mat-dialog-content>

  <mat-dialog-actions>
    <button mat-button [mat-dialog-close]="false" class="cancel-btn">
      {{ data.cancelLabel || 'Annuler' }}
    </button>
    <button mat-raised-button [color]="data.type === 'danger' ? 'warn' : 'primary'"
            [mat-dialog-close]="true" class="confirm-btn">
      <mat-icon>{{ getIcon() }}</mat-icon>
      {{ data.confirmLabel || 'Confirmer' }}
    </button>
  </mat-dialog-actions>

</div>
