# ============================================================
# FermeDirecte - Spring Boot Application Properties
# ============================================================

spring.application.name=FermeDirecte

# -------------------------------------------------------
# Database (XAMPP MySQL)
# -------------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/fermedirecte?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -------------------------------------------------------
# JWT Configuration
# -------------------------------------------------------
# Clé secrète pour signer les tokens JWT (minimum 256 bits / 32 caractères)
jwt.secret=FermeDirecte2024SecretKeyForJWTTokenSignatureWithHMACSHA256AlgorithmSecureEnough!@#$%
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000

# -------------------------------------------------------
# JPA / Hibernate
# -------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# -------------------------------------------------------
# Server
# -------------------------------------------------------
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# -------------------------------------------------------
# Multipart (file upload)
# -------------------------------------------------------
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# -------------------------------------------------------
# CORS (Angular dev server)
# -------------------------------------------------------
app.cors.allowed-origins=http://localhost:4200,http://localhost:4201

# -------------------------------------------------------
# Logging
# -------------------------------------------------------
logging.level.root=WARN
logging.level.com.FermeDirecte=DEBUG
logging.level.org.springframework.security=WARN
